name: tests

# Test gate on the oldest and newest supported Pythons. The floor job exists
# because dev machines run newer interpreters: v0.0.5 shipped syntax legal
# only above the then-3.11 floor and crashed every floor install on import,
# with nothing before publish to catch it. Keep the matrix minimum equal to
# requires-python in pyproject.toml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e . pytest  # pywinpty is win-only/conditional; stdlib pty on Linux
      - name: Compile all modules (import-time syntax gate)
        run: python -m compileall -q horus
      - name: Run tests
        run: python -m pytest -q
