name: continuity

# Pre-merge closure gate: require that a PR closed its Horus session — the dashboard's
# lanes reflect the change before it lands on main. Closure *authoring* is in-session
# (the agent has the context); this just verifies the committed result at the PR
# boundary. The `freshness` job is a required main-branch status check, so queued
# server-side auto-merges cannot bypass it.

on:
  pull_request:
    branches: [main]

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the base ref for the diff heuristic
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .  # pywinpty is win-only/conditional; stdlib pty on Linux
      - name: Dashboard-freshness check
        run: python -m horus close --check --base-ref "origin/${{ github.base_ref }}"
