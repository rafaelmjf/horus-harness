name: continuity

# Pre-merge continuity gate. Under the default handoff granularity, product commits
# themselves are durable delivery receipts and canonical narrative may be batched until
# a real context boundary. Per-delivery mode still requires PRD/lanes in every PR. The
# required job also keeps dashboard/card hygiene and git checkpoint checks server-side.

on:
  pull_request:
    branches: [main]

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the base ref for the diff heuristic
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .  # pywinpty is win-only/conditional; stdlib pty on Linux
      - name: Dashboard-freshness check
        run: python -m horus close --check --base-ref "origin/${{ github.base_ref }}"
